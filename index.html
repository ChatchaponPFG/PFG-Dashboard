<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PFG Business Intelligence Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

#login-page{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:rgba(255,255,255,0.08);
    padding:30px;
    border-radius:12px;
    text-align:center;
    width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.login-box h2{
    margin-bottom:15px;
}

.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:none;
}

.login-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2c8be6;
    color:white;
    cursor:pointer;
    font-weight:500;
}

.login-box button:hover{
    background:#1b6ec2;
}

#error-msg{
    color:#ff6b6b;
    margin-top:10px;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background: radial-gradient(circle at top left, #0f2a5c, #08142b 60%);
    color:white;
}

/* HEADER */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 40px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

/* LEFT SIDE INLINE */
.header-left{
    display:flex;
    align-items:center;
    gap:15px;
    min-width:0; /* prevents breaking */
}

/* LOGO */
.logo{
    height:42px;
    width:auto;
    display:block;
}

/* TITLE */
.header-title{
    font-size:20px;
    font-weight:600;
    white-space:nowrap; /* 🔥 prevent line break */
}

/* RIGHT SIDE NAV */
.nav-bar{
    display:flex;
    gap:12px;
    margin-left:auto;
}

/* NAV BUTTON */
.nav-item{
    padding:8px 18px;
    border-radius:10px;
    cursor:pointer;
    background:rgba(255,255,255,0.08);
    transition:0.3s;
    font-size:14px;
}

.nav-item.active{
    background:#2c8be6;
}

.nav-item:hover{
    background:rgba(255,255,255,0.2);
}

/* CONTAINER */

.dashboard-container{
    width:94%;
    margin:20px auto;
}

/* CARD */

.dashboard-card{
    background:linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    border-radius:18px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* POWER BI */

.powerbi-wrapper{
    width:100%;
    aspect-ratio:16/9;
    border-radius:12px;
    overflow:hidden;
}

.powerbi-wrapper iframe{
    width:100%;
    height:100%;
    border:none;
}

/* DOWNLOAD */

.download-list{
    display:flex;
    flex-direction:column;
    gap:15px;
    margin-top:20px;
}

.download-btn{
    display:inline-block;
    padding:14px 20px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background:linear-gradient(90deg,#1b6ec2,#2c8be6);
    width:320px;
    text-align:center;
    transition:0.3s;
    font-weight:500;
}

.download-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* =========================
   MOBILE RESPONSIVE FIX
========================= */

@media (max-width: 768px){

    /* HEADER STACK */
    .header{
        flex-direction:column;
        align-items:flex-start;
        padding:15px 20px;
        gap:12px;
    }

    .header-left{
        width:100%;
        justify-content:flex-start;
    }

    .header-title{
        font-size:16px;
        white-space:normal; /* allow wrap */
    }

    /* NAV BAR */
    .nav-bar{
        width:100%;
        overflow-x:auto;
        gap:8px;
    }

    .nav-item{
        flex:0 0 auto;
        padding:8px 14px;
        font-size:13px;
    }

    /* CONTAINER */
    .dashboard-container{
        width:95%;
        margin:15px auto;
    }

    /* CARD */
    .dashboard-card{
        padding:15px;
    }

    /* POWER BI (important fix) */
    .powerbi-wrapper{
        aspect-ratio: 16 / 10; /* taller for mobile */
    }

    /* DOWNLOAD BUTTON */
    .download-btn{
        width:100%;
        font-size:14px;
    }

    /* LOGIN BOX */
    .login-box{
        width:90%;
        padding:20px;
    }
}
    
</style>
</head>

<script>

const SESSION_LIMIT = 30 * 60 * 1000; // 30 minutes (adjust here)

// Run when page loads
document.addEventListener("DOMContentLoaded", function(){

    const isLoggedIn = localStorage.getItem("loggedIn");
    const loginTime = localStorage.getItem("loginTime");

    if(isLoggedIn === "true" && loginTime){

        const now = new Date().getTime();

        if(now - loginTime < SESSION_LIMIT){
            // ✅ still valid session
            document.getElementById("login-page").style.display = "none";
            document.getElementById("main-content").style.display = "block";
        }else{
            // ⛔ session expired
            logout();
        }

    }else{
        document.getElementById("login-page").style.display = "flex";
        document.getElementById("main-content").style.display = "none";
    }

});

// LOGIN
function checkLogin(){
    const password = document.getElementById("password").value;

    if(password === "pfg123"){
        localStorage.setItem("loggedIn", "true");
        localStorage.setItem("loginTime", new Date().getTime()); // ⏱ save time

        document.getElementById("login-page").style.display = "none";
        document.getElementById("main-content").style.display = "block";
    }else{
        document.getElementById("error-msg").innerText = "Wrong password";
    }
}

// LOGOUT
function logout(){
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("loginTime");

    location.reload();
}

</script>

<div id="login-page">
    <div class="login-box">
        <h2>PFG Dashboard Login</h2>
        <input type="password" id="password" placeholder="Enter password">
        <button onclick="checkLogin()">Login</button>
        <p id="error-msg"></p>
    </div>
</div>

<script>


function showSection(section, element){

    document.getElementById('dashboard-section').style.display = 'none';
    document.getElementById('download-section').style.display = 'none';

    document.getElementById(section + '-section').style.display = 'block';

    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    element.classList.add('active');
}

</script>
